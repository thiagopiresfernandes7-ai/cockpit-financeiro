<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07111f">
<title>Cockpit Financeiro</title>
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:radial-gradient(circle at 70% 0%,rgba(76,201,255,.18),transparent 34%),linear-gradient(180deg,#03101e,#020711);
    color:#e7f1ff;
  }
  .loader{
    width:min(420px,calc(100vw - 32px));
    padding:24px;
    border-radius:24px;
    border:1px solid rgba(142,213,255,.18);
    background:rgba(17,31,52,.82);
    box-shadow:0 28px 90px rgba(0,0,0,.38);
  }
  .loader b{display:block;font-size:18px;margin-bottom:8px}
  .loader p{margin:0;color:#bfd0e5;line-height:1.5;font-size:14px}
</style>
</head>
<body>
<div class="loader">
  <b>Carregando Cockpit Financeiro...</b>
  <p>Aplicando versão mobile compacta.</p>
</div>

<script>
(async function(){
  const SOURCE = "https://raw.githubusercontent.com/thiagopiresfernandes7-ai/cockpit-financeiro/f317404497cc1712fae8da1824d3e3d45f64a599/index.html";

  const mobileHotfixCss = `
/* Cockpit mobile compact hotfix */
.user-avatar{
  overflow:hidden!important;
  display:grid!important;
  place-items:center!important;
  flex:0 0 auto!important;
  border:0!important;
  line-height:1!important;
  color:#031827!important;
  font-weight:1000!important;
}
.user-avatar img,
.profile-avatar img{
  width:100%!important;
  height:100%!important;
  display:block!important;
  border-radius:inherit!important;
  object-fit:cover!important;
}
.user-avatar span{
  width:100%!important;
  height:100%!important;
  display:grid!important;
  place-items:center!important;
}

@media(min-width:781px){
  #dashboard>.page-head,
  #dashboard .dashboard-head,
  .top .title,
  #topGlobalAddBtn{
    display:none!important;
  }
  .top{
    min-height:46px!important;
    height:auto!important;
    padding:8px clamp(16px,1.2vw,22px)!important;
    justify-content:flex-end!important;
    background:transparent!important;
    border-bottom:1px solid rgba(142,213,255,.08)!important;
  }
  .content{padding-top:10px!important}
  .dashboard-kpis{margin-top:0!important}
}

@media(max-width:780px){
  .app{padding-top:0!important}
  .top{
    position:relative!important;
    inset:auto!important;
    height:52px!important;
    min-height:52px!important;
    padding:0 12px!important;
    gap:8px!important;
  }
  .top .title,
  #topGlobalAddBtn,
  #exportBtn{
    display:none!important;
  }
  .monthbar #prevMonth,
  .monthbar #nextMonth,
  .monthbar #todayBtn{
    display:none!important;
  }
  .monthbar input{
    height:34px!important;
    min-width:126px!important;
    width:126px!important;
  }
  .actions{
    width:100%!important;
    justify-content:flex-end!important;
    gap:8px!important;
  }
  .content{
    padding:10px 12px calc(96px + var(--mobile-safe,0px))!important;
  }
  #dashboard>.page-head,
  #dashboard .dashboard-head{
    display:none!important;
  }
  .dashboard-kpis{
    grid-template-columns:repeat(2,minmax(0,1fr))!important;
    gap:10px!important;
    margin-bottom:10px!important;
  }
  #dashboard .dashboard-kpis .kpi:nth-child(n+5){
    display:none!important;
  }
  #dashboard .kpi{
    min-height:82px!important;
    padding:12px!important;
  }
  #dashboard .kpi span{
    font-size:8.5px!important;
    letter-spacing:.1em!important;
  }
  #dashboard .kpi b{
    font-size:20px!important;
    margin-top:4px!important;
  }
  #dashboard .kpi .delta{
    font-size:10px!important;
  }
  .dashboard-grid-12{gap:10px!important}
  #dashboard .dashboard-grid-12 > .goal-mini-card{
    order:-2!important;
  }
  #dashboard .dashboard-grid-12 > .panel:nth-child(1){order:1!important}
  #dashboard .dashboard-grid-12 > .panel:nth-child(4){order:2!important}
  #dashboard .dashboard-grid-12 > .panel:nth-child(2){order:3!important}
  #dashboard .dashboard-grid-12 > .panel:nth-child(3),
  #dashboard .dashboard-grid-12 > .panel:nth-child(5),
  #dashboard .dashboard-grid-12 > .panel:nth-child(6),
  #dashboard .dashboard-grid-12 > .panel:nth-child(8){
    display:none!important;
  }
  #dashboard .goal-mini-card{
    min-height:0!important;
    padding:12px!important;
    grid-template-columns:34px 1fr!important;
    gap:10px!important;
  }
  #dashboard .goal-mini-icon{
    width:34px!important;
    height:34px!important;
    border-radius:13px!important;
  }
  #dashboard .goal-mini-card h2{
    font-size:14px!important;
    margin:1px 0!important;
  }
  #dashboard .goal-mini-card p,
  #dashboard .goal-mini-card .btn,
  #dashboard .panel-head p{
    display:none!important;
  }
  #dashboard .panel{padding:12px!important}
  #dashboard .panel-head{margin-bottom:8px!important}
  #dashboard .compact-list{gap:7px!important}
  #dashboard .compact-list .item{
    padding:8px!important;
    border-radius:13px!important;
  }
  #dashboard .compact-list .item:nth-child(n+4){
    display:none!important;
  }
}`;

  function applyPatches(html){
    html = html.replace("</style>", mobileHotfixCss + "\n</style>");

    html = html.replace(
      `function setAvatarNode(node,name,email,url){if(!node)return;if(url){node.innerHTML='<img alt="" src="'+esc(url)+'">'}else{node.textContent=initials(name,email)}}`,
      `function setAvatarNode(node,name,email,url){if(!node)return;if(url){node.innerHTML='<img alt="" referrerpolicy="no-referrer" src="'+esc(url)+'">'}else{node.innerHTML='<span>'+esc(initials(name,email))+'</span>'}}`
    );

    html = html.replace(
      `function updateUserIdentity(){var p=(state&&state.profile)||{},name=p.name||'Usuário',email=p.email||(user&&user.email)||'';setAvatarNode(el('userMenuButton'),name,email,p.avatarUrl);setText('userAvatarText',initials(name,email));setAvatarNode(el('profileAvatar'),name,email,p.avatarUrl);setText('profileIdentityName',name);setText('profileIdentityEmail',email||'E-mail não informado');if(el('profileGoogleSyncNote'))el('profileGoogleSyncNote').classList.toggle('hidden',!p.profileSyncedFromGoogle)}`,
      `function updateUserIdentity(){var p=(state&&state.profile)||{},name=p.name||'Usuário',email=p.email||(user&&user.email)||'';setAvatarNode(el('userMenuButton'),name,email,p.avatarUrl);setAvatarNode(el('profileAvatar'),name,email,p.avatarUrl);setText('profileIdentityName',name);setText('profileIdentityEmail',email||'E-mail não informado');if(el('profileGoogleSyncNote'))el('profileGoogleSyncNote').classList.toggle('hidden',!p.profileSyncedFromGoogle)}`
    );

    return html;
  }

  try{
    const response = await fetch(SOURCE, {cache:"no-store"});
    if(!response.ok) throw new Error("Falha ao carregar base do app: " + response.status);
    const originalHtml = await response.text();
    const patchedHtml = applyPatches(originalHtml);
    document.open();
    document.write(patchedHtml);
    document.close();
  }catch(error){
    document.body.innerHTML = `
      <div class="loader">
        <b>Erro ao carregar o Cockpit Financeiro</b>
        <p>${String(error.message || error)}</p>
      </div>
    `;
  }
})();
</script>
</body>
</html>
