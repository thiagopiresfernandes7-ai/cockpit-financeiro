<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#07111f">
<title>Cockpit Financeiro</title>
<style>
  :root{color-scheme:dark}
  *{box-sizing:border-box}
  html,body{margin:0;min-height:100%}
  body{
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:24px;
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:
      radial-gradient(circle at 76% -8%,rgba(76,201,255,.16),transparent 32%),
      radial-gradient(circle at 8% 110%,rgba(54,228,198,.11),transparent 34%),
      linear-gradient(180deg,#03101e 0%,#04101d 52%,#020711 100%);
    color:#e7f1ff;
  }
  .restore-card{
    width:min(460px,100%);
    border-radius:28px;
    border:1px solid rgba(142,213,255,.22);
    background:linear-gradient(180deg,rgba(27,45,71,.84),rgba(14,28,47,.90));
    box-shadow:0 28px 90px rgba(0,0,0,.42);
    padding:24px;
  }
  .brand{display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .mark{
    width:52px;height:52px;border-radius:18px;
    display:grid;place-items:center;
    color:#031827;font-weight:1000;
    background:linear-gradient(135deg,#4cc9ff,#36e4c6);
    box-shadow:0 16px 44px rgba(76,201,255,.22),inset 0 1px 0 rgba(255,255,255,.34);
  }
  b{display:block;font-size:20px;letter-spacing:-.04em}
  p{margin:8px 0 0;color:#bfd0e5;line-height:1.55;font-size:14px}
  small{display:block;margin-top:14px;color:#7f94ae;line-height:1.45}
</style>
</head>
<body>
  <div class="restore-card">
    <div class="brand">
      <div class="mark">CF</div>
      <div>
        <b>Cockpit Financeiro</b>
        <p>Restaurando versão premium funcional...</p>
      </div>
    </div>
    <small>Carregando a última base premium estável, com as funções e integrações anteriores preservadas.</small>
  </div>

<script>
(function(){
  "use strict";

  /*
    RESTAURAÇÃO PREMIUM
    Este arquivo não reconstrói o app.
    Ele restaura a base premium/funcional anterior ao erro de simplificação.
    Commit estável: f317404497cc1712fae8da1824d3e3d45f64a599
  */
  var PREMIUM_SOURCE =
    "https://raw.githubusercontent.com/thiagopiresfernandes7-ai/cockpit-financeiro/f317404497cc1712fae8da1824d3e3d45f64a599/index.html";

  fetch(PREMIUM_SOURCE + "?restore=" + Date.now(), { cache: "no-store" })
    .then(function(response){
      if(!response.ok) throw new Error("Falha ao carregar versão premium: HTTP " + response.status);
      return response.text();
    })
    .then(function(html){
      document.open();
      document.write(html);
      document.close();
    })
    .catch(function(error){
      document.body.innerHTML =
        '<div class="restore-card">' +
          '<div class="brand"><div class="mark">!</div><div><b>Erro ao restaurar</b><p>' +
          String(error.message || error).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]}) +
          '</p></div></div>' +
          '<small>Verifique a conexão e tente atualizar a página. Se persistir, restaure manualmente o commit f317404.</small>' +
        '</div>';
    });
})();
</script>
</body>
</html>
